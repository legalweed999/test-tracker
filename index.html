<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试用户 · 体重看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            display: flex; justify-content: center;
            padding: 20px;
        }
        .container { max-width: 800px; width: 100%; }
        .card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        h1 { font-size: 24px; color: #333; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
        .stats { display: flex; gap: 16px; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 120px; }
        .stat-item .label { font-size: 12px; color: #888; }
        .stat-item .value { font-size: 22px; font-weight: 700; color: #333; }
        .stat-item .change { font-size: 13px; }
        .change.up { color: #e74c3c; }
        .change.down { color: #27ae60; }
        canvas { max-height: 300px; }
        .records { margin-top: 16px; }
        .record { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .record .date { color: #888; }
        .record .weight { font-weight: 600; }
        .footer { text-align: center; color: #aaa; font-size: 12px; padding: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚡ 测试用户</h1>
            <div class="subtitle">虾教练 🦞 · 内测看板</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="label">当前体重</div>
                    <div class="value">--</div>
                </div>
                <div class="stat-item">
                    <div class="label">初始体重</div>
                    <div class="value">--</div>
                </div>
                <div class="stat-item">
                    <div class="label">已减</div>
                    <div class="value change down">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size:18px; margin-bottom:12px;">📈 体重趋势</h2>
            <canvas id="weightChart"></canvas>
        </div>

        <div class="card">
            <h2 style="font-size:18px; margin-bottom:12px;">📋 记录</h2>
            <div class="records" id="records">
                <div style="color:#888; text-align:center; padding:20px;">暂无记录，明天开始记录吧 🌅</div>
            </div>
        </div>

        <div class="footer">虾教练 🦞 · 数据仅存储在本机</div>
    </div>

    <script>
        const data = [];
        const ctx = document.getElementById('weightChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    label: '体重 (kg)',
                    data: data.map(d => d.weight),
                    borderColor: '#6C5CE7',
                    backgroundColor: 'rgba(108,92,231,0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: '#6C5CE7'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: false, grid: { color: 'rgba(0,0,0,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
